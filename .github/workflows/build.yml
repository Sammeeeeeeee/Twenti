name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Twenti.csproj

      - name: Publish single-file portable
        run: dotnet publish Twenti.csproj -c Release -r win-x64 -o publish

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Twenti-portable-win-x64
          path: publish/Twenti.exe
          if-no-files-found: error

      - name: Compile installer (Inno Setup 6)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\Twenti.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Twenti-installer-win-x64
          path: installer/Output/Twenti-Setup.exe
          if-no-files-found: error

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/Twenti.exe
            installer/Output/Twenti-Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
